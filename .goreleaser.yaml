version: 2

builds:
  - main: ./cmd/hc
    binary: hc
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# release-please owns the changelog and the GitHub Release body.
changelog:
  disable: true

# release-please creates the GitHub Release as a draft (drafts are mutable);
# goreleaser uploads the binaries into that draft and publishes it.
release:
  use_existing_draft: true
  draft: false
