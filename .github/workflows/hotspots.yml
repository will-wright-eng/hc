name: hotspots

on:
  workflow_dispatch:
    inputs:
      pr:
        description: PR number or branch name to analyze and comment on
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  hotspots:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number and ref
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "$INPUT_PR" =~ ^[0-9]+$ ]]; then
            pr_number="$INPUT_PR"
          else
            pr_number="$(gh pr list --repo "$REPO" --head "$INPUT_PR" --state open --json number --jq '.[0].number // empty')"
            if [[ -z "$pr_number" ]]; then
              echo "No open PR found for branch: $INPUT_PR" >&2
              exit 1
            fi
          fi
          ref="$(gh pr view "$pr_number" --repo "$REPO" --json headRefOid --jq .headRefOid)"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build hc
        run: make build

      - name: Analyze repository
        run: ./hc analyze --json > hotspots.json

      - name: Render report
        run: ./hc md report --collapsible --input hotspots.json --output report.md

      - name: Post report to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        run: ./scripts/post-pr-comment.sh report.md hc-hotspots
