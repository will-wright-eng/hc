name: pr-file-comments-manual

# Manual sibling of pr-file-comments.yml. Runs the same projection-filter
# pipeline against an arbitrary PR on demand, with --no-min-age so files
# younger than 14 days still get classified. Useful for dogfooding the
# action on PRs that pre-date the workflow, or for re-running after a
# tweak to templates / scripts without pushing a new PR commit.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to analyze
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR base/head SHAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          shas=$(gh pr view "$PR_NUMBER" --json baseRefOid,headRefOid \
            --jq '"BASE_SHA=" + .baseRefOid + "\nHEAD_SHA=" + .headRefOid')
          echo "$shas" >> "$GITHUB_ENV"

      - name: Fetch PR refs
        run: |
          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build hc
        run: make build

      - name: Prepare base worktree
        run: git worktree add --detach ../hc-base "$BASE_SHA"

      - name: Determine changed files
        run: make pr-changed-files

      - name: Analyze base branch (restricted to changed files, no min-age floor)
        run: make pr-hotspots-json-no-min-age

      - name: Post per-file hotspot comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: make pr-file-comments
