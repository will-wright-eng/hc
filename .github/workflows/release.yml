name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name:         ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      # release-please opened a DRAFT release for this version. GitHub does NOT
      # create the git tag for a draft (the tag is only created on publish), so
      # check out the release commit (github.sha) rather than the tag, which
      # does not exist yet.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # GoReleaser needs full history + existing tags

      # Create the tag GoReleaser builds from and that the draft publishes onto.
      # Pushing it at the exact release commit makes versioning deterministic and
      # lets the draft publish attach to an existing tag (no commitish race).
      # NB: tag pushes don't retrigger any workflow (all gate on branches:[main]).
      - name: Create and push release tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # GoReleaser finds release-please's existing draft (use_existing_draft),
      # uploads the archives into it while it is still a mutable draft, then
      # flips it to published (draft:false) -> immutable WITH assets attached.
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.release-please.outputs.tag_name }}
