# Default state for all rules
default: true

# MD013 - Line length
MD013:
  line_length: 120
  heading_line_length: 120
  code_block_line_length: 120
  tables: false

# MD024 - Multiple headings with the same content
MD024:
  siblings_only: true

# MD033 - Inline HTML
MD033: false

# MD041 - First line in a file should be a top-level heading
MD041: false
